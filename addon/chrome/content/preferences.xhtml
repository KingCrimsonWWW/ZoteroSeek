<vbox id="zotero-prefpane-zoteroseek" onload="Zotero.ZoteroSeek.hooks.onPrefsLoad(window)">
  <groupbox>
    <label><html:h2 data-l10n-id="prefs-title"></html:h2></label>
    <hbox>
      <label value="API Key:"/>
      <html:input id="zoteroseek-api-key" type="text" flex="1"/>
    </hbox>
    <hbox>
      <label value="Model:"/>
      <html:input id="zoteroseek-model" type="text" flex="1"/>
    </hbox>
    <hbox>
      <label value="Base URL:"/>
      <html:input id="zoteroseek-base-url" type="text" flex="1"/>
    </hbox>
  </groupbox>
</vbox>
